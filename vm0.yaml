      VM0_TOKEN: ${{ secrets.VM0_TOKEN }}
      FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
      GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
      DEFAULT_REPO: ${vars.DEFAULT_REPO}
